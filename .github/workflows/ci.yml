name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: contextor
          POSTGRES_PASSWORD: test
          POSTGRES_DB: contextor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        run: go build ./...

      - name: Test
        env:
          DATABASE_URL: postgres://contextor:test@localhost:5432/contextor_test?sslmode=disable
        run: go test ./... -v -race

      - name: Vet
        run: go vet ./...
