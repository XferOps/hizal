name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: winnow
          POSTGRES_PASSWORD: test
          POSTGRES_DB: winnow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        run: go build ./...

      - name: Run migrations
        env:
          DATABASE_URL: postgres://winnow:test@localhost:5432/winnow_test?sslmode=disable
        run: |
          curl -sSL https://github.com/golang-migrate/migrate/releases/download/v4.18.3/migrate.linux-amd64.tar.gz | tar -xz
          ./migrate -path ./internal/db/migrations -database "$DATABASE_URL" up

      - name: Test
        env:
          DATABASE_URL: postgres://winnow:test@localhost:5432/winnow_test?sslmode=disable
        run: go test ./... -v -race

      - name: Vet
        run: go vet ./...
